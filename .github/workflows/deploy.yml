name: Deploy To EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: JDK 17버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: application.yml 파일 만들기
        run: echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/application.yml

      - name: 테스트 및 빌드하기
        run: ./gradlew clean build -x test

      - name: 빌드된 파일 이름 변경하기
        run: mv ./build/libs/*SNAPSHOT.jar ./project.jar

      - name: SCP로 EC2에 빌드된 파일 전송하기
        uses: appleboy/scp-action@v0.1.7
        with:
          # private EC2의 private IP/DNS
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          # bastion host (public subnet) 경유
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USERNAME }}
          proxy_key: ${{ secrets.BASTION_PRIVATE_KEY }}
          source: project.jar
          target: /home/ubuntu/onfilm/tobe

      - name: SSH로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.2.1
        with:
          # private EC2의 private IP/DNS
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          # bastion host (public subnet) 경유
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USERNAME }}
          proxy_key: ${{ secrets.BASTION_PRIVATE_KEY }}
          script_stop: true # 아래 script 중 실패하는 명령이 하나라도 있으면 실패로 처리
          script: |
            rm -rf /home/ubuntu/onfilm/current
            mkdir /home/ubuntu/onfilm/current
            mv /home/ubuntu/onfilm/tobe/project.jar /home/ubuntu/onfilm/current/project.jar
            cd /home/ubuntu/onfilm/current
            sudo fuser -k -n tcp 8080 || true
            if ! command -v ffprobe >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ffmpeg
            fi
            SPRING_PROFILES_ACTIVE=prod \
            DB_URL="${{ secrets.DB_URL }}" \
            DB_USER="${{ secrets.DB_USER }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            S3_BUCKET="${{ secrets.S3_BUCKET }}" \
            S3_REGION="${{ secrets.S3_REGION }}" \
            S3_PUBLIC_BASE_URL="${{ secrets.S3_PUBLIC_BASE_URL }}" \
            S3_ACCESS_KEY="${{ secrets.S3_ACCESS_KEY }}" \
            S3_SECRET_KEY="${{ secrets.S3_SECRET_KEY }}" \
            nohup java -jar project.jar > ./output.log 2>&1 &
            rm -rf /home/ubuntu/onfilm/tobe