spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  h2:
    console:
      enabled: true

auth:
  access-cookie-secure: false
  csrf-cookie-secure: false
  refresh-cookie-secure: false

file:
  public-base-url: http://localhost:8080/files
  storage:
    type: local
    root: ./local-storage
