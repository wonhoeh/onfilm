spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_PRODUCER_IP:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

file:
  storage:
    type: s3
    bucket: ${S3_BUCKET:test-bucket}
    region: ${S3_REGION:ap-northeast-2}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    presign-expiration-minutes: 10
  public-base-url: ${S3_PUBLIC_BASE_URL:}

auth:
  access-cookie-secure: true
  csrf-cookie-secure: true
  refresh-cookie-secure: true

app:
  kafka:
    topic:
      media-encode-requested: media.encode.requested
