jwt:
  secret: "test-secret-key-test-secret-key-test-secret-key"

auth:
  access-token-ttl: 15m
  refresh-token-ttl: 14d
  access-cookie-secure: false
  access-cookie-name: access_token
  access-cookie-path: /
  access-cookie-same-site: Lax
  csrf-cookie-secure: false
  csrf-cookie-name: XSRF-TOKEN
  csrf-cookie-path: /
  csrf-cookie-same-site: Lax
  refresh-cookie-secure: false
  refresh-cookie-name: refresh_token
  refresh-cookie-path: /auth
  refresh-cookie-same-site: Lax

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
        show_sql: false
  sql:
    init:
      mode: always
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

file:
  public-base-url: http://localhost:8080/files
  storage:
    type: local
    bucket: onfilm-media
    root: /tmp/onfilm-test-storage
    presign-expiration-minutes: 10

app:
  kafka:
    topic:
      media-encode-requested: media.encode.requested
